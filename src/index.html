<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayerMusic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="glow-overlay" id="glowOverlay"></div>
  <div class="flash-overlay" id="flashOverlay"></div>
  <div class="grid-bg"></div>

  <div class="player" id="player">
    <div class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" width="28" height="28">
          <path d="M9 18V5l12-2v13" fill="none" stroke="#ff2040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="6" cy="18" r="3" fill="none" stroke="#ff2040" stroke-width="2"/>
          <circle cx="18" cy="16" r="3" fill="none" stroke="#ff2040" stroke-width="2"/>
        </svg>
        <span>PlayerMusic</span>
      </div>
       <div class="eq-wrap">
         <svg class="eq-icon" viewBox="0 0 16 16" width="13" height="13">
           <rect x="1" y="6" width="4" height="8" rx="1" fill="#a04040"/>
           <rect x="7" y="3" width="4" height="11" rx="1" fill="#a04040"/>
         </svg>
         <input type="range" id="bassSlider" min="-12" max="12" step="0.5" value="0" class="eq-slider" />
       </div>
       <div class="volume-wrap">
         <svg class="vol-icon" viewBox="0 0 24 24" width="16" height="16">
           <path d="M11 5L6 9H2v6h4l5 4V5z" fill="none" stroke="#a04040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
           <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07" fill="none" stroke="#a04040" stroke-width="2" stroke-linecap="round"/>
         </svg>
         <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7" class="eq-slider vol-slider" />
       </div>
       <div class="eq-wrap">
         <svg class="eq-icon" viewBox="0 0 16 16" width="13" height="13">
           <rect x="1" y="2" width="4" height="12" rx="1" fill="#a04040"/>
           <rect x="7" y="6" width="4" height="8" rx="1" fill="#a04040"/>
         </svg>
         <input type="range" id="trebleSlider" min="-12" max="12" step="0.5" value="0" class="eq-slider" />
       </div>
      <div class="theme-group">
        <button class="theme-btn theme-red active" data-theme="red" title="Red"></button>
        <button class="theme-btn theme-blue" data-theme="blue" title="Blue"></button>
        <button class="theme-btn theme-purple" data-theme="purple" title="Purple"></button>
        <button class="theme-btn theme-mix" data-theme="mix" title="Mix"></button>
      </div>
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16">
          <circle cx="11" cy="11" r="8" fill="none" stroke="#a04040" stroke-width="2"/>
          <path d="M21 21l-4.35-4.35" fill="none" stroke="#a04040" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="text" id="search" placeholder="Search songs..." />
      </div>
    </div>

    <div class="visualizer">
      <canvas id="visualizer"></canvas>
    </div>

    <div class="now-playing">
      <div class="track-info">
        <h2 class="track-title" id="title">No song selected</h2>
        <p class="track-artist" id="artist">Add songs to the folder</p>
      </div>
    </div>

    <div class="progress-area">
      <span class="time" id="currentTime">0:00</span>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="time" id="duration">0:00</span>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="prevBtn" title="Previous">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path d="M19 20L9 12l10-8v16z" fill="currentColor"/>
          <path d="M5 19V5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="ctrl-btn play-btn" id="playBtn" title="Play">
        <svg viewBox="0 0 24 24" width="30" height="30">
          <polygon points="8,5 19,12 8,19" fill="currentColor"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="nextBtn" title="Next">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path d="M5 20l10-8-10-8v16z" fill="currentColor"/>
          <path d="M19 5v14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="playlist-section">
      <div class="playlist-header">
        <span>Playlist</span>
        <span class="song-count" id="songCount">0 songs</span>
      </div>
      <ul class="playlist" id="playlist"></ul>
    </div>
  </div>

  <audio id="audio"></audio>
  <script src="script.js"></script>
</body>
</html>
