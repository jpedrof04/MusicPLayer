<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayerMusic</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="player">
      <div class="header">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" width="28" height="28">
            <path d="M9 18V5l12-2v13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="6" cy="18" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
            <circle cx="18" cy="16" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
          </svg>
          <span>PlayerMusic</span>
        </div>
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16">
            <circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M21 21l-4.35-4.35" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input type="text" id="search" placeholder="Search songs..." />
        </div>
      </div>

      <div class="now-playing">
        <div class="cover">
          <svg viewBox="0 0 80 80" width="80" height="80">
            <defs>
              <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00d4ff"/>
                <stop offset="100%" stop-color="#7c3aed"/>
              </linearGradient>
            </defs>
            <rect width="80" height="80" rx="16" fill="url(#grad)" opacity="0.15"/>
            <circle cx="40" cy="35" r="12" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.6"/>
            <circle cx="40" cy="35" r="5" fill="url(#grad)" opacity="0.4"/>
            <path d="M30 50 Q40 32 50 50" fill="none" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
            <path d="M34 56 Q40 46 46 56" fill="none" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
          </svg>
        </div>
        <div class="track-info">
          <h2 class="track-title" id="title">No song selected</h2>
          <p class="track-artist" id="artist">Add songs to the folder</p>
        </div>
      </div>

      <div class="progress-area">
        <span class="time" id="currentTime">0:00</span>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="time" id="duration">0:00</span>
      </div>

      <div class="controls">
        <button class="ctrl-btn" id="prevBtn" title="Previous">
          <svg viewBox="0 0 24 24" width="22" height="22">
            <path d="M19 20L9 12l10-8v16z" fill="currentColor"/>
            <path d="M5 19V5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="ctrl-btn play-btn" id="playBtn" title="Play">
          <svg viewBox="0 0 24 24" width="28" height="28">
            <polygon points="8,5 19,12 8,19" fill="currentColor"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="nextBtn" title="Next">
          <svg viewBox="0 0 24 24" width="22" height="22">
            <path d="M5 20l10-8-10-8v16z" fill="currentColor"/>
            <path d="M19 5v14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="playlist-section">
        <div class="playlist-header">
          <span>Playlist</span>
          <span class="song-count" id="songCount">0 songs</span>
        </div>
        <ul class="playlist" id="playlist"></ul>
      </div>
    </div>
  </div>

  <audio id="audio"></audio>
  <script src="script.js"></script>
</body>
</html>
